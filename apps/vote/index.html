<style>
  :root {
    --vote-primary: #6b8fd9;
    --vote-primary-light: #a8c7e8;
    --vote-secondary: #f0f4f8;
    --vote-danger: #e74c3c;
    --vote-success: #27ae60;
    --vote-warning: #f39c12;
    --vote-text: #333;
    --vote-text-light: #666;
    --vote-border: #e0e6ed;
    --vote-shadow: 0 4px 20px rgba(0,0,0,0.1);
    --vote-radius: 16px;
  }

  #vote-app-root {
    min-height: 60vh;
    padding: 30px 20px;
    font-family: 'Microsoft YaHei', sans-serif;
    max-width: 1200px;
    margin: 0 auto;
  }

  .vote-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .vote-header h1 {
    font-size: clamp(24px, 5vw, 36px);
    color: var(--vote-primary);
    margin: 0 0 10px;
    font-weight: 800;
  }

  .vote-header p {
    color: var(--vote-text-light);
    font-size: 14px;
    margin: 0;
  }

  .vote-user-status {
    position: fixed;
    top: 90px;
    right: 30px;
    z-index: 1000;
    background: white;
    padding: 10px 20px;
    border-radius: 30px;
    box-shadow: var(--vote-shadow);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vote-user-status.admin {
    background: linear-gradient(135deg, var(--vote-primary), var(--vote-primary-light));
    color: white;
  }

  .vote-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .vote-tab {
    padding: 12px 30px;
    border: 2px solid var(--vote-border);
    border-radius: 30px;
    background: white;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s;
  }

  .vote-tab:hover {
    border-color: var(--vote-primary);
    color: var(--vote-primary);
  }

  .vote-tab.active {
    background: var(--vote-primary);
    color: white;
    border-color: var(--vote-primary);
  }

  .vote-container {
    background: white;
    border-radius: var(--vote-radius);
    box-shadow: var(--vote-shadow);
    padding: 30px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .vote-section-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--vote-text);
    margin: 0 0 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--vote-secondary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vote-info-box {
    background: var(--vote-secondary);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 25px;
  }

  .vote-info-box h3 {
    margin: 0 0 10px;
    font-size: 16px;
    color: var(--vote-primary);
  }

  .vote-info-box p, .vote-info-box li {
    margin: 5px 0;
    font-size: 14px;
    color: var(--vote-text-light);
    line-height: 1.6;
  }

  .vote-info-box ul {
    margin: 10px 0 0;
    padding-left: 20px;
  }

  .vote-candidates {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .vote-candidate-card {
    background: var(--vote-secondary);
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    border: 3px solid transparent;
    position: relative;
  }

  .vote-candidate-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 30px rgba(107, 143, 217, 0.2);
  }

  .vote-candidate-card.selected {
    border-color: var(--vote-primary);
    background: linear-gradient(135deg, rgba(107, 143, 217, 0.1), rgba(168, 199, 232, 0.1));
  }

  .vote-candidate-card.selected::after {
    content: '✓';
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    background: var(--vote-primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
  }

  .vote-avatar-wrap {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 15px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--vote-primary), var(--vote-primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .vote-avatar-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: white;
  }

  .vote-avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .vote-candidate-card h4 {
    margin: 0 0 10px;
    font-size: 18px;
    color: var(--vote-text);
  }

  .vote-candidate-card p {
    margin: 0;
    font-size: 13px;
    color: var(--vote-text-light);
    line-height: 1.5;
  }

  .vote-form {
    background: var(--vote-secondary);
    border-radius: 12px;
    padding: 25px;
    margin-top: 20px;
  }

  .vote-form-group {
    margin-bottom: 20px;
  }

  .vote-form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 14px;
    color: var(--vote-text);
  }

  .vote-form-group label span {
    color: var(--vote-danger);
  }

  .vote-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--vote-border);
    border-radius: 10px;
    font-size: 14px;
    transition: all 0.3s;
    box-sizing: border-box;
  }

  .vote-input:focus {
    outline: none;
    border-color: var(--vote-primary);
    box-shadow: 0 0 0 3px rgba(107, 143, 217, 0.1);
  }

  .vote-btn {
    padding: 14px 40px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .vote-btn-primary {
    background: linear-gradient(135deg, var(--vote-primary), var(--vote-primary-light));
    color: white;
  }

  .vote-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(107, 143, 217, 0.4);
  }

  .vote-btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .vote-btn-secondary {
    background: var(--vote-secondary);
    color: var(--vote-text);
    border: 2px solid var(--vote-border);
  }

  .vote-btn-secondary:hover {
    border-color: var(--vote-primary);
    color: var(--vote-primary);
  }

  .vote-btn-danger {
    background: var(--vote-danger);
    color: white;
  }

  .vote-btn-danger:hover {
    opacity: 0.9;
  }

  .vote-btn-warning {
    background: var(--vote-warning);
    color: white;
  }

  .vote-btn-warning:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }

  .vote-btn-small {
    padding: 8px 16px;
    font-size: 13px;
  }

  .admin-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 15px;
  }

  .admin-actions .vote-btn {
    flex: 1;
    min-width: 150px;
  }

  .admin-hint {
    font-size: 12px;
    color: var(--vote-text-light);
    margin: 0;
    padding: 10px;
    background: rgba(107, 143, 217, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--vote-primary);
  }

  .vote-message {
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vote-message.success {
    background: rgba(39, 174, 96, 0.1);
    color: var(--vote-success);
    border: 1px solid rgba(39, 174, 96, 0.3);
  }

  .vote-message.error {
    background: rgba(231, 76, 60, 0.1);
    color: var(--vote-danger);
    border: 1px solid rgba(231, 76, 60, 0.3);
  }

  .vote-message.warning {
    background: rgba(243, 156, 18, 0.1);
    color: var(--vote-warning);
    border: 1px solid rgba(243, 156, 18, 0.3);
  }

  .vote-hidden {
    display: none !important;
  }

  .vote-loading {
    text-align: center;
    padding: 40px;
    color: var(--vote-text-light);
  }

  .vote-loading::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--vote-border);
    border-top-color: var(--vote-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .admin-panel {
    margin-top: 30px;
  }

  .admin-section {
    background: white;
    border-radius: var(--vote-radius);
    box-shadow: var(--vote-shadow);
    padding: 25px;
    margin-bottom: 25px;
  }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  .admin-table th, .admin-table td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid var(--vote-border);
    font-size: 14px;
  }

  .admin-table th {
    background: var(--vote-secondary);
    font-weight: 600;
    color: var(--vote-text);
  }

  .admin-table tr:hover {
    background: rgba(107, 143, 217, 0.05);
  }

  .admin-table .actions {
    display: flex;
    gap: 8px;
  }

  .admin-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .admin-badge.success {
    background: rgba(39, 174, 96, 0.1);
    color: var(--vote-success);
  }

  .admin-badge.warning {
    background: rgba(243, 156, 18, 0.1);
    color: var(--vote-warning);
  }

  .admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
  }

  .admin-stat-card {
    background: linear-gradient(135deg, var(--vote-primary), var(--vote-primary-light));
    color: white;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
  }

  .admin-stat-card h4 {
    margin: 0 0 10px;
    font-size: 14px;
    opacity: 0.9;
  }

  .admin-stat-card .number {
    font-size: 36px;
    font-weight: 800;
  }

  .vote-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function() {
  const SUPABASE_URL = 'https://rhnhuxykupumluhmwvlo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_rCyLOweRttAZ293c25hbGA_H1k4iuU0';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    db: { schema: 'app' }
  });

  const root = document.getElementById('vote-app-root');
  
  let currentUser = null;
  let userProfile = null;
  let isAdmin = false;
  let candidates = [];
  let selectedCandidate = null;
  let hasVoted = false;
  let currentView = 'vote';
  let allVotes = [];
  let deviceId = null;

  function getDeviceId() {
    let id = localStorage.getItem('vote_device_id');
    if (!id) {
      id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('vote_device_id', id);
    }
    return id;
  }

  async function init() {
    deviceId = getDeviceId();
    await checkAuth();
    render();
  }

  async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadProfile();
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        await loadProfile();
        render();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        userProfile = null;
        isAdmin = false;
        render();
      }
    });
  }

  async function loadProfile() {
    if (!currentUser) return;
    
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .maybeSingle();
    
    if (data) {
      userProfile = data;
      isAdmin = data.is_admin === true;
    }
  }

  async function loadCandidates() {
    const { data, error } = await supabase
      .from('vote_candidates')
      .select('*')
      .order('created_at', { ascending: true });
    
    if (!error && data) {
      candidates = data;
    }
  }

  async function checkVoteStatus() {
    const savedVrcId = localStorage.getItem('vote_vrcid');
    const currentDeviceId = getDeviceId();
    
    const { data, error } = await supabase
      .from('vote_records')
      .select('id, vrcid')
      .or(`vrcid.eq.${savedVrcId || 'null'},device_id.eq.${currentDeviceId}`)
      .maybeSingle();
    
    if (!error && data) {
      hasVoted = true;
      if (data.vrcid && !savedVrcId) {
        localStorage.setItem('vote_vrcid', data.vrcid);
      }
    } else {
      hasVoted = false;
      localStorage.removeItem('vote_vrcid');
    }
  }

  async function loadAllVotes() {
    if (!isAdmin) return;
    
    const { data, error } = await supabase
      .from('vote_records')
      .select(`
        id,
        vrcid,
        created_at,
        candidate_id,
        vote_candidates(id, name, description)
      `)
      .order('created_at', { ascending: false });
    
    if (!error && data) {
      allVotes = data;
    }
  }

  async function getCandidateVoteCounts() {
    const { data, error } = await supabase
      .from('vote_candidates')
      .select('id, name, vote_count');
    
    if (!error && data) {
      return data;
    }
    return [];
  }

  function render() {
    let html = `
      <div class="vote-header">
        <h1>🗳️ 轻音投票</h1>
        <p>超级无敌炫酷的匿名投票平台</p>
      </div>
    `;

    if (currentUser && userProfile) {
      html += `
        <div class="vote-user-status ${isAdmin ? 'admin' : ''}">
          <span>👤 ${userProfile.username || '用户'}</span>
          ${isAdmin ? '<span>👑 管理员</span>' : ''}
        </div>
      `;
    }

    if (isAdmin) {
      html += `
        <div class="vote-tabs">
          <div class="vote-tab ${currentView === 'vote' ? 'active' : ''}" onclick="switchView('vote')">🗳️ 投票界面</div>
          <div class="vote-tab ${currentView === 'admin' ? 'active' : ''}" onclick="switchView('admin')">⚙️ 管理后台</div>
        </div>
      `;
    }

    if (currentView === 'vote') {
      html += renderVoteView();
    } else if (currentView === 'admin' && isAdmin) {
      html += renderAdminView();
    }

    root.innerHTML = html;
  }

  function renderVoteView() {
    return `
      <div class="vote-container" id="vote-content">
        <div class="vote-section-title">📋 投票说明</div>
        <div class="vote-info-box">
          <h3>投票规则</h3>
          <ul>
            <li>每位用户每次活动仅限投一票，请谨慎选择</li>
            <li>投票时需要填写您的 VRC ID 以便核实身份（不公开）</li>
            <li>投票结果将在投票结束后公布</li>
            <li>请根据被投票者的描述信息进行合理投票</li>
          </ul>
        </div>

        <div class="vote-section-title">🤝 联动社团</div>
        <div class="vote-collab-section">
          <div class="vote-collab-cards">
            <div class="vote-collab-card">
              <div class="vote-collab-avatar">
                <img src="https://ui-avatars.com/api/?name=LQY&background=6b8fd9&color=fff&size=100" alt="轻音会社">
              </div>
              <h4>轻音会社</h4>
              <p>VRC音乐社团，致力于打造温馨的音乐交流社区</p>
              <a href="/about/" class="vote-collab-link">了解详情</a>
            </div>
            <div class="vote-collab-card">
              <div class="vote-collab-avatar">
                <img src="https://ui-avatars.com/api/?name=WST&background=27ae60&color=fff&size=100" alt="往世乐土">
              </div>
              <h4>中文歌友会</h4>
              <p>VRC音乐社团</p>
              <a href="/p/qytgwswslst/" class="vote-collab-link">了解详情</a>
            </div>
            <div class="vote-collab-card">
              <div class="vote-collab-avatar">
                <img src="https://ui-avatars.com/api/?name=XH&background=e74c3c&color=fff&size=100" alt="限定红茶">
              </div>
              <h4>哈夫克</h4>
              <p>VRC游戏社交社团</p>
              <a href="/p/qztghc/" class="vote-collab-link">了解详情</a>
            </div>
          </div>
        </div>

        <div class="vote-section-title">🎯 选择候选人（乱序）</div>
        <div id="candidates-area">
          <div class="vote-loading">正在加载候选人信息</div>
        </div>

        <div id="vote-form-area"></div>
      </div>
    `;
  }

  function renderAdminView() {
    return `
      <div class="admin-panel">
        <div class="admin-stats" id="admin-stats">
          <div class="admin-stat-card">
            <h4>总投票数</h4>
            <div class="number" id="stat-total">-</div>
          </div>
          <div class="admin-stat-card">
            <h4>候选人数</h4>
            <div class="number" id="stat-candidates">-</div>
          </div>
          <div class="admin-stat-card">
            <h4>今日投票</h4>
            <div class="number" id="stat-today">-</div>
          </div>
        </div>

        <div class="admin-section">
          <div class="vote-section-title">
            🔄 活动管理
          </div>
          <div class="admin-actions">
            <button class="vote-btn vote-btn-warning" onclick="resetAllVotes()">
              🗑️ 清空投票记录
            </button>
            <button class="vote-btn vote-btn-danger" onclick="resetAllCandidates()">
              ⚠️ 清空所有候选人
            </button>
            <button class="vote-btn vote-btn-secondary" onclick="resetAll()">
              🔁 重置全部（新活动）
            </button>
          </div>
          <p class="admin-hint">💡 提示：重置全部将清空所有投票记录和候选人，用于开启新的投票活动</p>
        </div>

        <div class="admin-section">
          <div class="vote-section-title">
            👥 候选人管理
            <button class="vote-btn vote-btn-primary vote-btn-small" style="margin-left:auto" onclick="openCandidateModal()">
              ➕ 添加候选人
            </button>
          </div>
          <div id="admin-candidates-table">
            <div class="vote-loading">正在加载...</div>
          </div>
        </div>

        <div class="admin-section">
          <div class="vote-section-title">📊 投票记录</div>
          <div id="admin-votes-table">
            <div class="vote-loading">正在加载...</div>
          </div>
        </div>

        <div class="admin-section">
          <div class="vote-section-title">📈 实时票数</div>
          <div id="admin-vote-counts">
            <div class="vote-loading">正在加载...</div>
          </div>
        </div>
      </div>
    `;
  }

  async function loadVoteViewData() {
    await loadCandidates();
    await checkVoteStatus();
    
    const candidatesArea = document.getElementById('candidates-area');
    const formArea = document.getElementById('vote-form-area');

    if (hasVoted) {
      candidatesArea.innerHTML = `
        <div class="vote-result-card">
          <div class="icon">✅</div>
          <h2>您已完成投票</h2>
          <p>感谢您的参与！每人仅限投一票。</p>
        </div>
      `;
      formArea.innerHTML = '';
      return;
    }

    if (candidates.length === 0) {
      candidatesArea.innerHTML = `
        <div class="vote-message warning">
          ⚠️ 当前没有可投票的候选人
        </div>
      `;
      return;
    }

    let html = '<div class="vote-candidates">';
    candidates.forEach(c => {
      const avatarHtml = c.avatar_url 
        ? `<img src="${escapeHtml(c.avatar_url)}" alt="${escapeHtml(c.name)}" class="vote-avatar-img">`
        : '<div class="vote-avatar-placeholder">👤</div>';
      html += `
        <div class="vote-candidate-card ${selectedCandidate?.id === c.id ? 'selected' : ''}" 
             onclick="selectCandidate('${c.id}')">
          <div class="vote-avatar-wrap">${avatarHtml}</div>
          <h4>${escapeHtml(c.name)}</h4>
          <p>${escapeHtml(c.description || '暂无描述')}</p>
        </div>
      `;
    });
    html += '</div>';
    candidatesArea.innerHTML = html;

    if (selectedCandidate) {
      formArea.innerHTML = `
        <div class="vote-form">
          <div class="vote-form-group">
            <label>您的 VRC ID <span>*</span></label>
            <input type="text" class="vote-input" id="vrcid-input" 
                   placeholder="请输入您的 VRC ID" maxlength="100">
          </div>
          <div style="text-align:center;">
            <button class="vote-btn vote-btn-primary" onclick="submitVote()" id="submit-vote-btn">
              ✅ 确认投票
            </button>
          </div>
        </div>
      `;
    } else {
      formArea.innerHTML = '';
    }
  }

  async function loadAdminData() {
    await loadCandidates();
    await loadAllVotes();
    
    const voteCounts = await getCandidateVoteCounts();
    
    document.getElementById('stat-candidates').textContent = candidates.length;
    document.getElementById('stat-total').textContent = allVotes.length;
    
    const today = new Date().toISOString().split('T')[0];
    const todayVotes = allVotes.filter(v => v.created_at?.startsWith(today)).length;
    document.getElementById('stat-today').textContent = todayVotes;

    const candidatesTable = document.getElementById('admin-candidates-table');
    if (candidates.length === 0) {
      candidatesTable.innerHTML = '<p style="color:var(--vote-text-light);text-align:center;padding:20px;">暂无候选人</p>';
    } else {
      let html = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>名称</th>
              <th>描述</th>
              <th>票数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;
      candidates.forEach(c => {
        const count = voteCounts.find(v => v.id === c.id)?.vote_count || 0;
        html += `
          <tr>
            <td>${c.id.substring(0, 8)}...</td>
            <td>${escapeHtml(c.name)}</td>
            <td>${escapeHtml(c.description || '-')}</td>
            <td><span class="admin-badge success">${count} 票</span></td>
            <td class="actions">
              <button class="vote-btn vote-btn-secondary vote-btn-small" onclick="openCandidateModal('${c.id}')">编辑</button>
              <button class="vote-btn vote-btn-danger vote-btn-small" onclick="deleteCandidate('${c.id}')">删除</button>
            </td>
          </tr>
        `;
      });
      html += '</tbody></table>';
      candidatesTable.innerHTML = html;
    }

    const votesTable = document.getElementById('admin-votes-table');
    if (allVotes.length === 0) {
      votesTable.innerHTML = '<p style="color:var(--vote-text-light);text-align:center;padding:20px;">暂无投票记录</p>';
    } else {
      let html = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>投票ID</th>
              <th>VRC ID</th>
              <th>投票对象</th>
              <th>投票时间</th>
            </tr>
          </thead>
          <tbody>
      `;
      allVotes.slice(0, 50).forEach(v => {
        html += `
          <tr>
            <td>${v.id.substring(0, 8)}...</td>
            <td>${escapeHtml(v.vrcid)}</td>
            <td>${escapeHtml(v.vote_candidates?.name || '-')}</td>
            <td>${formatDate(v.created_at)}</td>
          </tr>
        `;
      });
      html += '</tbody></table>';
      if (allVotes.length > 50) {
        html += `<p style="text-align:center;color:var(--vote-text-light);margin-top:10px;">显示前50条记录，共${allVotes.length}条</p>`;
      }
      votesTable.innerHTML = html;
    }

    const countsArea = document.getElementById('admin-vote-counts');
    if (voteCounts.length === 0) {
      countsArea.innerHTML = '<p style="color:var(--vote-text-light);text-align:center;padding:20px;">暂无票数数据</p>';
    } else {
      let html = '<table class="admin-table"><thead><tr><th>候选人</th><th>票数</th></tr></thead><tbody>';
      voteCounts.sort((a, b) => (b.vote_count || 0) - (a.vote_count || 0));
      voteCounts.forEach(v => {
        html += `<tr><td>${escapeHtml(v.name)}</td><td><span class="admin-badge success">${v.vote_count || 0} 票</span></td></tr>`;
      });
      html += '</tbody></table>';
      countsArea.innerHTML = html;
    }
  }

  window.switchView = async (view) => {
    currentView = view;
    render();
    if (view === 'vote') {
      await loadVoteViewData();
    } else if (view === 'admin') {
      await loadAdminData();
    }
  };

  window.selectCandidate = (id) => {
    selectedCandidate = candidates.find(c => c.id === id);
    loadVoteViewData();
  };

  window.submitVote = async () => {
    if (!selectedCandidate) {
      alert('请先选择候选人');
      return;
    }

    const vrcid = document.getElementById('vrcid-input').value.trim();
    if (!vrcid) {
      alert('请填写您的 VRC ID');
      return;
    }

    const btn = document.getElementById('submit-vote-btn');
    btn.disabled = true;
    btn.textContent = '提交中...';

    try {
      const { data: existingVote, error: checkError } = await supabase
        .from('vote_records')
        .select('id, vrcid')
        .or(`vrcid.eq.${vrcid},device_id.eq.${deviceId}`)
        .maybeSingle();

      if (existingVote) {
        if (existingVote.vrcid === vrcid) {
          alert('该 VRC ID 已经投过票了，每人仅限一票！');
        } else {
          alert('该设备已经投过票了，每台设备仅限一票！');
        }
        btn.disabled = false;
        btn.textContent = '✅ 确认投票';
        return;
      }

      const { error } = await supabase
        .from('vote_records')
        .insert({
          candidate_id: selectedCandidate.id,
          vrcid: vrcid,
          device_id: deviceId
        });

      if (error) {
        if (error.code === '23505') {
          alert('该 VRC ID 或设备已经投过票了！');
        } else {
          throw error;
        }
      } else {
        hasVoted = true;
        localStorage.setItem('vote_vrcid', vrcid);
        loadVoteViewData();
      }
    } catch (e) {
      alert('投票失败: ' + e.message);
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = '✅ 确认投票';
    }
  };

  window.openCandidateModal = async (id = null) => {
    let candidate = null;
    if (id) {
      const { data } = await supabase
        .from('vote_candidates')
        .select('*')
        .eq('id', id)
        .single();
      candidate = data;
    }

    const modal = document.createElement('div');
    modal.className = 'vote-modal-overlay';
    modal.id = 'candidate-modal';
    modal.innerHTML = `
      <div class="vote-modal">
        <h3>${candidate ? '编辑候选人' : '添加候选人'}</h3>
        <div class="vote-form-group">
          <label>名称 <span>*</span></label>
          <input type="text" class="vote-input" id="modal-name" 
                 value="${candidate ? escapeHtml(candidate.name) : ''}" 
                 placeholder="请输入候选人名称" maxlength="100">
        </div>
        <div class="vote-form-group">
          <label>头像链接</label>
          <input type="text" class="vote-input" id="modal-avatar" 
                 value="${candidate ? escapeHtml(candidate.avatar_url || '') : ''}" 
                 placeholder="请输入头像图片URL（可选）">
        </div>
        <div class="vote-form-group">
          <label>描述</label>
          <textarea class="vote-input" id="modal-desc" rows="3" 
                    placeholder="请输入候选人描述">${candidate ? escapeHtml(candidate.description || '') : ''}</textarea>
        </div>
        <div class="vote-modal-actions">
          <button class="vote-btn vote-btn-secondary" onclick="closeCandidateModal()">取消</button>
          <button class="vote-btn vote-btn-primary" onclick="saveCandidate('${id || ''}')">保存</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    setTimeout(() => modal.classList.add('active'), 10);
  };

  window.closeCandidateModal = () => {
    const modal = document.getElementById('candidate-modal');
    if (modal) {
      modal.classList.remove('active');
      setTimeout(() => modal.remove(), 300);
    }
  };

  window.saveCandidate = async (id) => {
    const name = document.getElementById('modal-name').value.trim();
    const desc = document.getElementById('modal-desc').value.trim();
    const avatar = document.getElementById('modal-avatar').value.trim();

    if (!name) {
      alert('请输入候选人名称');
      return;
    }

    try {
      if (id) {
        const { error } = await supabase
          .from('vote_candidates')
          .update({ name, description: desc, avatar_url: avatar })
          .eq('id', id);
        if (error) throw error;
      } else {
        const { error } = await supabase
          .from('vote_candidates')
          .insert({ name, description: desc, avatar_url: avatar });
        if (error) throw error;
      }
      
      closeCandidateModal();
      loadAdminData();
    } catch (e) {
      alert('保存失败: ' + e.message);
      console.error(e);
    }
  };

  window.deleteCandidate = async (id) => {
    if (!confirm('确定要删除该候选人吗？此操作不可恢复！')) return;

    try {
      const { error } = await supabase
        .from('vote_candidates')
        .delete()
        .eq('id', id);
      
      if (error) throw error;
      loadAdminData();
    } catch (e) {
      alert('删除失败: ' + e.message);
      console.error(e);
    }
  };

  window.resetAllVotes = async () => {
    if (!confirm('确定要清空所有投票记录吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：这将删除所有投票数据！')) return;

    try {
      const { error } = await supabase
        .from('vote_records')
        .delete()
        .neq('id', '00000000-0000-0000-0000-000000000000');
      
      if (error) throw error;

      const { error: updateError } = await supabase
        .from('vote_candidates')
        .update({ vote_count: 0 })
        .neq('id', '00000000-0000-0000-0000-000000000000');
      
      if (updateError) throw updateError;

      localStorage.removeItem('vote_vrcid');
      localStorage.removeItem('vote_device_id');
      deviceId = getDeviceId();
      hasVoted = false;
      alert('投票记录已清空！用户刷新页面后可重新投票。');
      loadAdminData();
    } catch (e) {
      alert('清空失败: ' + e.message);
      console.error(e);
    }
  };

  window.resetAllCandidates = async () => {
    if (!confirm('确定要清空所有候选人吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：这将删除所有候选人及其投票数据！')) return;

    try {
      const { error } = await supabase
        .from('vote_candidates')
        .delete()
        .neq('id', '00000000-0000-0000-0000-000000000000');
      
      if (error) throw error;

      localStorage.removeItem('vote_vrcid');
      localStorage.removeItem('vote_device_id');
      deviceId = getDeviceId();
      hasVoted = false;
      alert('候选人已清空！');
      loadAdminData();
    } catch (e) {
      alert('清空失败: ' + e.message);
      console.error(e);
    }
  };

  window.resetAll = async () => {
    if (!confirm('确定要重置全部数据吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：这将清空所有投票记录和候选人，用于开启新的投票活动！')) return;
    if (!confirm('最后确认：确定要执行此操作吗？')) return;

    try {
      const { error: voteError } = await supabase
        .from('vote_records')
        .delete()
        .neq('id', '00000000-0000-0000-0000-000000000000');
      
      if (voteError) throw voteError;

      const { error: candidateError } = await supabase
        .from('vote_candidates')
        .delete()
        .neq('id', '00000000-0000-0000-0000-000000000000');
      
      if (candidateError) throw candidateError;

      localStorage.removeItem('vote_vrcid');
      localStorage.removeItem('vote_device_id');
      deviceId = getDeviceId();
      hasVoted = false;
      alert('已重置全部数据，可以开始新的投票活动！用户刷新页面后可重新投票。');
      loadAdminData();
    } catch (e) {
      alert('重置失败: ' + e.message);
      console.error(e);
    }
  };

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleString('zh-CN');
  }

  init();

  setTimeout(() => {
    if (currentView === 'vote') {
      loadVoteViewData();
    }
  }, 100);
})();
</script>

<script>
(function() {
  
  const SUPABASE_URL = 'https://rhnhuxykupumluhmwvlo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_rCyLOweRttAZ293c25hbGA_H1k4iuU0';

  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    db: { schema: 'app' }
  });

  const root = document.getElementById('ltyy-float-root');
  
  let currentUser = null;
  let userProfile = null;
  let modalType = 'login';

  
  async function ensureProfile(user) {
    if (!user) return null;
    
    
    const { data: existing, error: fetchError } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .maybeSingle();
    
    if (fetchError) {
      console.error('检查用户资料失败:', fetchError);
      return null;
    }
    
    if (existing) return existing;
    
    
    const defaultProfile = {
      id: user.id,
      email: user.email,
      username: user.email?.split('@')[0] || '新用户',
      avatar_url: null,
      is_banned: false,
      created_at: new Date().toISOString()
    };
    
    const { data: inserted, error: insertError } = await supabase
      .from('profiles')
      .insert(defaultProfile)
      .select()
      .single();
    
    if (insertError) {
      console.error('创建用户资料失败:', insertError);
      return defaultProfile; 
    }
    
    return inserted;
  }

  async function loadProfile() {
    if (!currentUser) {
      userProfile = null;
      return;
    }
    userProfile = await ensureProfile(currentUser);
  }

  
  function renderLoggedOut() {
    root.innerHTML = `<div class="lty-fab" onclick="openModal('login')" title="登录">🎵</div>`;
  }

  function renderLoggedIn() {
    
    const name = userProfile ? (userProfile.username || '轻音成员') : '加载中...';
    
    const avatar = userProfile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6b8fd9&color=fff&size=128`;
    
    root.innerHTML = `
      <div class="lty-fab" onclick="toggleMenu()" title="${name}">
        <img src="${avatar}" alt="Avatar">
      </div>
      <div class="lty-menu" id="lty-menu">
        <div class="lty-username">${name}</div>
        <div class="lty-actions">
          <button class="lty-btn-action lty-btn-upload" onclick="openModal('avatarSelect')">
            <span>📷</span> 更换头像
          </button>
          <button class="lty-btn-action lty-btn-edit" onclick="openModal('editProfile')">
            <span>✏️</span> 修改资料
          </button>
          <button class="lty-btn-action lty-btn-logout" onclick="handleLogout()">
            <span>🚪</span> 退出登录
          </button>
        </div>
      </div>
    `;
  }

  
  window.toggleMenu = () => {
    const menu = document.getElementById('lty-menu');
    if (menu) menu.classList.toggle('active');
  };

  window.closeModal = () => {
    const el = document.getElementById('lty-modal-overlay');
    if (el) {
      el.classList.remove('active');
      setTimeout(() => el.remove(), 300);
    }
  };

  window.openModal = async (type) => {
    modalType = type;
    document.getElementById('lty-menu')?.classList.remove('active');
    
    if ((type === 'editProfile' || type === 'avatarSelect') && !userProfile) {
      await loadProfile();
      if (!userProfile) {
        alert('无法加载用户资料，请刷新页面重试。');
        return;
      }
    }

    const old = document.getElementById('lty-modal-overlay');
    if (old) old.remove();

    let content = '';
    
    if (type === 'login' || type === 'register') {
      const isLogin = type === 'login';
      content = `
        <h3 class="lty-title">${isLogin ? '欢迎回来' : '加入轻音会社'}</h3>
        <input type="email" id="lty-email" class="lty-input" placeholder="邮箱" autocomplete="email">
        <input type="password" id="lty-pass" class="lty-input" placeholder="密码 (≥6位)" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
        <button class="lty-btn-main" onclick="submitAuth()">${isLogin ? '登录' : '注册'}</button>
        <p style="margin-top:15px; font-size:13px; color:#888;">
          ${isLogin ? '没账号？' : '有账号？'} 
          <span style="color:#6b8fd9; cursor:pointer; font-weight:bold;" onclick="openModal('${isLogin ? 'register' : 'login'}')">${isLogin ? '去注册' : '去登录'}</span>
        </p>
      `;
    } else if (type === 'editProfile') {
      const currentName = userProfile?.username || '';
      content = `
        <h3 class="lty-title">修改资料</h3>
        <label style="display:block; text-align:left; font-size:12px; color:#666; margin-bottom:5px;">用户名</label>
        <input type="text" id="edit-username" class="lty-input" value="${currentName.replace(/"/g, '&quot;')}" placeholder="输入新用户名">
        <button class="lty-btn-main" onclick="updateUsername()">保存修改</button>
        <button class="lty-btn-secondary" onclick="closeModal()">取消</button>
      `;
    } else if (type === 'avatarSelect') {
      content = `
        <h3 class="lty-title">更换头像</h3>
        <div class="lty-tab-group">
          <div class="lty-tab active" onclick="switchAvatarTab('upload', this)">本地上传</div>
          <div class="lty-tab" onclick="switchAvatarTab('link', this)">外链图片</div>
        </div>
        
        <div id="tab-upload">
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadAvatarFile(this)">
          <button class="lty-btn-main" onclick="document.getElementById('file-input').click()">选择图片文件</button>
          <p style="font-size:12px; color:#999; margin-top:10px;">支持 JPG, PNG, WEBP (最大 1MB)</p>
        </div>

        <div id="tab-link" class="lty-hidden">
          <input type="url" id="link-input" class="lty-input" placeholder="https://example.com/avatar.jpg">
          <button class="lty-btn-main" onclick="updateAvatarLink()">使用外链</button>
        </div>
        
        <button class="lty-btn-secondary" style="margin-top:20px;" onclick="closeModal()">取消</button>
      `;
    }

    const html = `
      <div class="lty-modal-overlay active" id="lty-modal-overlay" onclick="if(event.target===this) closeModal()">
        <div class="lty-modal">
          <span class="lty-close" onclick="closeModal()">&times;</span>
          ${content}
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', html);
  };

  window.switchAvatarTab = (tabName, btn) => {
    document.querySelectorAll('.lty-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const uploadTab = document.getElementById('tab-upload');
    const linkTab = document.getElementById('tab-link');
    if (tabName === 'upload') {
      uploadTab.classList.remove('lty-hidden');
      linkTab.classList.add('lty-hidden');
    } else {
      uploadTab.classList.add('lty-hidden');
      linkTab.classList.remove('lty-hidden');
    }
  };

  
  window.submitAuth = async () => {
    const email = document.getElementById('lty-email').value.trim();
    const pass = document.getElementById('lty-pass').value.trim();
    if (!email || !pass) return alert('请填写完整');

    
    if (modalType === 'register' && pass.length < 6) {
      return alert('密码长度不能少于6位');
    }
    
    const btn = document.querySelector('.lty-btn-main');
    const oldText = btn.innerText;
    btn.innerText = '...';
    btn.disabled = true;

    try {
      if (modalType === 'register') {
        
        const { data: existingProfile, error: checkError } = await supabase
          .from('profiles')
          .select('email')
          .eq('email', email)
          .maybeSingle();
        
        if (checkError) throw new Error('检查邮箱失败：' + checkError.message);
        
        if (existingProfile) {
          throw new Error('该邮箱已注册，请直接登录');
        }

        const { error, data } = await supabase.auth.signUp({ email, password: pass });
        if (error) {
          
          throw new Error('注册失败：' + error.message);
        }
        alert('注册邮件已发送，请查收完成验证。');
        closeModal();
      } else {
        const { error, data } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) {
          
          if (error.message.includes('Invalid login credentials')) {
            throw new Error('邮箱或密码错误');
          } else if (error.message.includes('Email not confirmed')) {
            throw new Error('邮箱未验证，请先验证邮箱');
          } else {
            throw new Error('登录失败：' + error.message);
          }
        }
        
        currentUser = data.user;
        await loadProfile();  
        renderLoggedIn();
        closeModal();
      }
    } catch (e) {
      alert(e.message);
    } finally {
      btn.innerText = oldText;
      btn.disabled = false;
    }
  };

  window.handleLogout = async () => {
    if (!confirm('确定退出登录？')) return;
    await supabase.auth.signOut();
    currentUser = null;
    userProfile = null;
    renderLoggedOut();
  };

  
  window.updateUsername = async () => {
    if (!userProfile) {
      alert('用户资料未加载，请刷新页面重试。');
      return;
    }

    const newUsername = document.getElementById('edit-username').value.trim();
    if (!newUsername) return alert('用户名不能为空');
    if (newUsername === userProfile.username) {
      alert('用户名未改变');
      closeModal();
      return;
    }

    const btn = document.querySelector('.lty-btn-main');
    btn.innerText = '保存中...';
    btn.disabled = true;

    try {
      const { error } = await supabase
        .from('profiles')
        .update({ username: newUsername })
        .eq('id', currentUser.id);
      
      if (error) {
        if (error.code === '23505') alert('该用户名已被占用，请换一个。');
        else throw error;
      } else {
        userProfile.username = newUsername;
        alert('用户名修改成功！');
        renderLoggedIn();
        closeModal();
      }
    } catch (e) {
      alert('修改失败: ' + e.message);
      console.error(e);
    } finally {
      btn.innerText = '保存修改';
      btn.disabled = false;
    }
  };

  
  window.uploadAvatarFile = async (input) => {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 1024 * 1024) return alert('文件不能超过 1MB');
    await processAvatarUpload(file);
  };

  window.updateAvatarLink = async () => {
    const url = document.getElementById('link-input').value.trim();
    if (!url) return alert('请输入链接');
    if (!url.startsWith('http')) return alert('链接必须以 http 或 https 开头');
    await updateAvatarUrlInDb(url);
  };

  async function processAvatarUpload(file) {
    const btn = document.querySelector('.lty-btn-main');
    if (btn) {
      btn.innerText = '上传中...';
      btn.disabled = true;
    }

    try {
      
      if (userProfile?.avatar_url && userProfile.avatar_url.includes('/avatars/')) {
        try {
          const urlObj = new URL(userProfile.avatar_url);
          const pathParts = urlObj.pathname.split('/');
          const bucketIndex = pathParts.indexOf('avatars');
          if (bucketIndex !== -1 && pathParts[bucketIndex + 1]) {
            const oldFileName = pathParts.slice(bucketIndex + 1).join('/');
            await supabase.storage.from('avatars').remove([oldFileName]);
          }
        } catch (e) {
          console.warn('删除旧头像失败（可忽略）:', e);
        }
      }

      
      const ext = file.name.split('.').pop();
      const fileName = `${currentUser.id}_${Date.now()}.${ext}`;
      
      const { error: uploadError } = await supabase.storage
        .from('avatars')
        .upload(fileName, file, { upsert: true });
      
      if (uploadError) {
        console.error('上传错误:', uploadError);
        if (uploadError.message.includes('bucket')) {
          alert('存储桶 "avatars" 未创建，请在 Supabase Storage 中创建公开桶 "avatars"。');
        } else {
          throw uploadError;
        }
        return;
      }

      const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(fileName);
      await updateAvatarUrlInDb(publicUrl);

    } catch (e) {
      alert('上传失败: ' + e.message);
      console.error(e);
    } finally {
      if (btn) {
        btn.innerText = '选择图片文件';
        btn.disabled = false;
      }
      closeModal();
    }
  }

  async function updateAvatarUrlInDb(url) {
    if (!userProfile) {
      alert('用户资料未加载，无法保存头像。');
      return;
    }

    try {
      const { data, error } = await supabase
        .from('profiles')
        .update({ avatar_url: url })
        .eq('id', currentUser.id)
        .select();

      if (error) {
        console.error('更新数据库失败:', error);
        throw new Error(error.message || '更新数据库失败');
      }

      if (!data || data.length === 0) {
        throw new Error('未找到用户记录，请重试');
      }

      userProfile.avatar_url = url;
      renderLoggedIn();
      alert('头像更新成功！✨');
      closeModal();
    } catch (e) {
      alert('保存失败: ' + e.message);
      console.error(e);
    }
  }

  
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('lty-menu');
    const fab = document.querySelector('.lty-fab');
    if (menu && !menu.contains(e.target) && (!fab || !fab.contains(e.target))) {
      menu.classList.remove('active');
    }
  });

  
  (async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadProfile();
      renderLoggedIn();
    } else {
      renderLoggedOut();
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        await loadProfile();
        renderLoggedIn();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        userProfile = null;
        renderLoggedOut();
      }
    });
  })();

})();
</script>
    </body>
</html>
